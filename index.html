            border: none;

            cursor: pointer;
            width: 100%;

            font-weight: 500;
            font-family: 'Orbitron', sans-serif;

            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0;
            visibility: hidden;

            border-radius: 2px;

            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

            align-items: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background-color: transparent;
            border: 1px solid var(--border);

            color: var(--text-main);
            font-size: 1rem;
            text-align: left;

</head>

    // 全局狀態
    let currentLang = 'zh';
    let currentStep = 0;
    const totalQuestions = 10;
    let userScores = { BTC: 0, ETH: 0, SOL: 0, SUI: 0, AVAX: 0, ADA: 0, TON: 0, BNB: 0 };
    let scoreHistory = []; 
    
    // 計算總分池 (依賴不變的計分邏輯)
    const poolScores = { BTC: 0, ETH: 0, SOL: 0, SUI: 0, AVAX: 0, ADA: 0, TON: 0, BNB: 0 };
    scoringMatrix.forEach(scores => {
        for (const chain in scores) poolScores[chain] += scores[chain];
    });

    let radarChartInstance = null;
    let finalPrimaryRole = "";

    // 語言切換邏輯
    function switchLang(lang) {
        currentLang = lang;
        
        // 更新切換器 UI
        document.querySelectorAll('.lang-switcher span').forEach(el => el.classList.remove('active'));
        document.getElementById(`lang-${lang}`).classList.add('active');

        // 更新靜態文字
        const text = i18n[lang].ui;
        document.getElementById('ui-top-label').innerText = text.topLabel;
        document.getElementById('ui-main-title').innerText = text.mainTitle;
        document.getElementById('ui-desc').innerHTML = text.desc;
        document.getElementById('ui-start-btn').innerText = text.startBtn;
        document.getElementById('ui-footer').innerText = text.footer;
        document.getElementById('back-btn').innerText = text.backBtn;
        document.getElementById('anim-label').innerText = text.resultLabel;
        document.getElementById('btn-retry').innerText = text.retryBtn;
        document.getElementById('btn-share').innerText = text.shareBtn;
        document.getElementById('ui-share-title').innerText = text.shareTitle;
        document.getElementById('ui-share-desc').innerText = text.shareDesc;
        document.getElementById('copy-btn').innerText = text.copyBtn;
        document.getElementById('btn-back-result').innerText = text.backResultBtn;

        // 若在測驗中，重新渲染題目
        if (document.getElementById('quiz-screen').style.display === 'block') {
            renderQuestion(true); 
        }

        // 若在結果頁，重新填入結果與文案
        if (document.getElementById('result-screen').style.display === 'block' || 
            document.getElementById('share-screen').style.display === 'block') {
            refreshResultText();
        }
    }

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        scoreHistory = []; 
        renderQuestion();
    }

    function renderQuestion(skipAnimation = false) {
        const wrapper = document.getElementById('quiz-content-wrapper');
        const backBtn = document.getElementById('back-btn');
        backBtn.style.visibility = currentStep > 0 ? 'visible' : 'hidden';
        
        if(!skipAnimation) wrapper.style.opacity = 0;

        setTimeout(() => {
            const progressPercent = ((currentStep + 1) / totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = `${progressPercent}%`;
            document.getElementById('progress-text').innerText = `${currentStep + 1}/${totalQuestions}`;

            const qData = i18n[currentLang].questions[currentStep];
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            qData.opts.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                
                // 處理 A) B) 等前綴樣式
                const match = optText.match(/^([A-D][）\)\]]?\s?)(.+)$/);
                if (match) {
                    btn.innerHTML = `<span style="color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 0.85rem; margin-right: 12px; opacity: 0.9;">${match[1]}</span><span>${match[2]}</span>`;
                } else {
                    btn.innerText = optText;
                }

                btn.onclick = function() {
                    const allBtns = document.querySelectorAll('.option-btn');
                    allBtns.forEach(b => b.style.pointerEvents = 'none'); 
                    
                    this.style.borderColor = 'var(--primary)';
                    this.style.borderLeftColor = 'var(--primary)';
                    this.style.backgroundColor = 'rgba(0, 212, 255, 0.12)';

                    // 取出對應的分數 (每題4選項，矩陣索引為 step * 4 + index)
                    const scoreObj = scoringMatrix[currentStep * 4 + index];
                    setTimeout(() => handleOptionSelect(scoreObj), 250);
                };
                optionsContainer.appendChild(btn);
            });

            if(!skipAnimation) wrapper.style.opacity = 1;
        }, skipAnimation ? 0 : 250); 
    }

    function handleOptionSelect(scoresToAdd) {
        scoreHistory.push(scoresToAdd);
        for (const chain in scoresToAdd) {
            userScores[chain] += scoresToAdd[chain];
        }

        currentStep++;
        
        if (currentStep < totalQuestions) {
            renderQuestion();
        } else {
            document.getElementById('progress-fill').style.width = `100%`;
            setTimeout(showResult, 300);
        }
    }

    function goBack() {
        if (currentStep === 0) return; 
        const lastScores = scoreHistory.pop();
        for (const chain in lastScores) {
            userScores[chain] -= lastScores[chain];
        }
        currentStep--;
        renderQuestion();
    }

    let globalSortedScores = []; // 供語系切換時使用

    function showResult() {
        window.scrollTo({ top: 0, behavior: 'smooth' });

        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const normalizedScores = {};
        for (const chain in userScores) {
            normalizedScores[chain] = (userScores[chain] / poolScores[chain]) * 100;
        }

        globalSortedScores = Object.entries(normalizedScores).sort((a, b) => b[1] - a[1]);
        
        refreshResultText(); // 填入文字資料
        
        const themeColor = chainColors[globalSortedScores[0][0]];
        triggerResultAnimations(normalizedScores, themeColor);
    }

    // 將填入文字的邏輯抽出，方便語系切換時呼叫
    function refreshResultText() {
        if (!globalSortedScores.length) return;
        
        const primaryChain = globalSortedScores[0][0];
        const secondaryChain = globalSortedScores[1][0];
        finalPrimaryRole = primaryChain;
        
        // --- GA4 Event Tracking ---
        if (typeof gtag === 'function') {
            gtag('event', 'quiz_result', {
                'primary_chain': primaryChain,
                'secondary_chain': secondaryChain
            });
        }

        const primaryData = i18n[currentLang].roles[primaryChain];
        const secondaryData = i18n[currentLang].roles[secondaryChain];
        const themeColor = chainColors[primaryChain];

        const logoEl = document.getElementById('result-logo');
        logoEl.style.display = 'block'; 
        logoEl.src = chainLogos[primaryChain];
        logoEl.alt = primaryData.name + " Logo";
        logoEl.onerror = function() { this.style.display = 'none'; };
        logoEl.style.filter = `drop-shadow(0 0 16px ${themeColor})`;
        
        const mainTitle = document.getElementById('result-main');
        mainTitle.innerText = `${primaryData.name} — ${primaryData.role}`;
        mainTitle.style.color = themeColor;
        
        document.getElementById('result-screen').style.setProperty('--result-theme-color', themeColor);
        
        document.getElementById('anim-desc').innerText = primaryData.desc;
        
        const hiddenPrefix = i18n[currentLang].ui.hiddenPrefix;
        const hiddenSuffix = i18n[currentLang].ui.hiddenSuffix.replace('{name}', secondaryData.name);
        
        document.getElementById('anim-hidden').innerHTML = `
            <div style="display:flex; align-items:center; gap: 8px; margin-bottom: 5px;">
                <img src="${chainLogos[secondaryChain]}" style="width:20px; height:20px; object-fit:contain;" alt="${secondaryData.name} Logo" onerror="this.style.display='none'">
                <b style="font-family: 'Orbitron', sans-serif;">${hiddenPrefix}${secondaryData.name} (${secondaryData.role})</b>
            </div>
            ${hiddenSuffix}
        `;

        // 如果在分享畫面，順便更新分享文字
        if (document.getElementById('share-screen').style.display === 'block') {
            generateShareText();
        }
    }

    function triggerResultAnimations(normalizedScores, themeColor) {
        const els = ['anim-label', 'anim-header', 'anim-desc', 'anim-hidden', 'anim-chart', 'anim-btns'].map(id => document.getElementById(id));
        els.forEach(el => {
            el.classList.remove('fade-in', 'slide-fade-in');
            el.classList.add('anim-opacity-0');
        });
        els[1].style.transform = "translateY(20px)";

        setTimeout(() => { els[0].classList.replace('anim-opacity-0', 'fade-in'); }, 50);
        setTimeout(() => { els[1].classList.replace('anim-opacity-0', 'slide-fade-in'); }, 400);
        setTimeout(() => { els[2].classList.replace('anim-opacity-0', 'fade-in'); }, 1000);
        setTimeout(() => { els[3].classList.replace('anim-opacity-0', 'fade-in'); }, 1100);
        
        setTimeout(() => { 
            els[4].classList.replace('anim-opacity-0', 'fade-in'); 
            renderRadarChart(normalizedScores, themeColor);
        }, 1200);

        setTimeout(() => { els[5].classList.replace('anim-opacity-0', 'fade-in'); }, 1300);
    }

    function renderRadarChart(normalizedScoresObj, themeColor) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        const labels = ["BTC", "ETH", "SOL", "SUI", "AVAX", "ADA", "TON", "BNB"];
        const dataPoints = labels.map(label => normalizedScoresObj[label]);

        if(radarChartInstance) radarChartInstance.destroy();

        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Match',
                    data: dataPoints,
                    backgroundColor: themeColor + '33', 
                    borderColor: themeColor,
                    pointBackgroundColor: themeColor,
                    pointBorderColor: themeColor,
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: themeColor,
                    borderWidth: 2,
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: 'rgba(255, 255, 255, 0.15)' },
                        grid: { color: 'rgba(255, 255, 255, 0.15)' },
                        pointLabels: { color: '#94a3b8', font: { size: 12, family: "'Orbitron', sans-serif" } },
                        ticks: { display: false, min: 0 } 
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: function(context) { return ' Match: ' + Math.round(context.raw) + '%'; } } }
                },
                maintainAspectRatio: false
            }
        });
    }

    const SHARE_URL = "https://wenqing950519.github.io/web3-school-quiz/"; 
    let shareTextContent = "";

    function generateShareText() {
        const primaryData = i18n[currentLang].roles[finalPrimaryRole];
        const urlPart = SHARE_URL ? '\n' + SHARE_URL : '';
        let template = i18n[currentLang].ui.shareTemplate;
        template = template.replace('{name}', primaryData.name).replace('{role}', primaryData.role);
        shareTextContent = template + urlPart;
        document.getElementById('share-preview-text').innerText = shareTextContent;
    }

    function goToShareScreen() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('share-screen').style.display = 'block';
        generateShareText();
    }

    function goBackToResult() {
        document.getElementById('share-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }

    function copyShareText() {
        const copyBtn = document.getElementById('copy-btn');
        const originalText = i18n[currentLang].ui.copyBtn;
        const successText = i18n[currentLang].ui.copiedBtn;
        
        navigator.clipboard.writeText(shareTextContent)
            .then(() => {
                copyBtn.innerText = successText;
                copyBtn.style.background = "#10b981"; 
                copyBtn.style.borderColor = "#10b981";
                setTimeout(() => {
                    // 若這 2 秒內切換了語言，抓取最新的原文字
                    copyBtn.innerText = i18n[currentLang].ui.copyBtn;
                    copyBtn.style.background = "var(--primary-grad)"; 
                    copyBtn.style.borderColor = "transparent";
                }, 2000);
            })
            .catch(() => alert('Copy failed. Please manually select the text.'));
    }
</script>

</body>
</html>
